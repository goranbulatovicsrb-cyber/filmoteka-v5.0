name: Build Filmoteka Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Postavi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instaliraj dependencies
        run: npm install

      - name: Build Windows installer (.exe)
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: Filmoteka-Windows-Setup
          path: dist/*.exe
          retention-days: 30

      - name: Prikaži veličinu builda
        run: dir dist
        shell: cmd
